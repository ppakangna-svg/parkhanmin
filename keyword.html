<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학과별 핵심 키워드 활용 탐구 질문 생성기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','맑은 고딕',sans-serif;background:#f4f3ef;min-height:100vh;color:#1a1a1a;font-size:15px}

/* ── 헤더: 옅은 블루 계열 ── */
header{background:linear-gradient(135deg,#0369a1 0%,#0284c7 50%,#38bdf8 100%);padding:20px 30px;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(3,105,161,.25)}
.header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
header h1{font-family:'Apple SD Gothic Neo','Noto Sans KR','맑은 고딕',sans-serif;font-size:34px;font-weight:400;color:#fff;line-height:1.3;letter-spacing:-.5px;text-shadow:0 1px 8px rgba(0,0,0,.18)}
.header-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;gap:4px;align-self:flex-end}
.header-credit{font-size:14px;color:rgba(255,255,255,.92);white-space:nowrap;font-weight:500}
.header-label{font-size:13px;color:rgba(255,255,255,.72);white-space:nowrap}

.layout{display:flex;height:calc(100vh - 90px)}
.sidebar{width:380px;min-width:340px;background:#fff;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;flex-shrink:0}
.search-area{padding:14px 14px 12px;border-bottom:.5px solid #f0efeb}
.search-area input{width:100%;padding:9px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:15px;outline:none;background:#fafaf8;color:#333}
.search-area input:focus{border-color:#0284c7}
.nav{overflow-y:auto;flex:1}
.계열-btn{width:100%;text-align:left;padding:13px 18px;font-size:17px;font-weight:700;border:none;border-bottom:.5px solid #f0efeb;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.dept-list{display:none}
.dept-list.open{display:block}
.dept-btn{width:100%;text-align:left;padding:9px 18px 9px 28px;font-size:15px;border:none;border-bottom:.5px solid #f9f8f5;cursor:pointer;background:#fff;color:#444;display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.dept-btn:hover{background:#f4f3ef}
.dept-btn.active{color:#0284c7;font-weight:700;background:#f0f9ff}
.dept-cnt{font-size:11px;color:#bbb;flex-shrink:0;margin-left:6px}

.main{flex:1;overflow-y:auto;padding:20px 26px;background:#f4f3ef}
.empty{display:flex;align-items:center;justify-content:center;height:100%;text-align:center;color:#bbb;font-size:15px;line-height:2;padding:40px}
.dept-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.dept-hdr h2{font-size:22px;font-weight:700;color:#111}
.계열-tag{font-size:12px;font-weight:700;padding:3px 11px;border-radius:99px}
.kw-count{font-size:13px;color:#aaa;margin-left:auto}
.kw-label{font-size:13px;color:#888;margin-bottom:10px}
.kw-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.kw-chip{padding:6px 15px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #e0dfdb;background:#fff;color:#444;transition:all .13s}
.kw-chip:hover{transform:translateY(-1px)}
.kw-chip.sel{color:#fff}

/* ── 자기질문 입력 패널 (기존 스타일 유지) ── */
.ask-panel{background:#fff;border-radius:16px;padding:24px 26px;border:1px solid #eeecea;margin-bottom:20px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ask-title{font-size:17px;font-weight:700;color:#111;margin-bottom:4px}
.ask-title em{font-style:normal;color:#7c3aed}
.ask-desc{font-size:14px;color:#555;margin-bottom:6px;line-height:1.7}
.ask-types-guide{background:#f9f8f6;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;line-height:1.9;color:#444}
.ask-types-guide strong{color:#7c3aed;font-weight:700}
.ask-types-guide .guide-row{display:flex;gap:8px;align-items:flex-start}
.ask-types-guide .g-badge{font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;flex-shrink:0;margin-top:3px}
.ask-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.ask-row{display:flex;align-items:center;gap:10px}
.ask-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:all .2s}
.ask-num.valid{background:#dcfce7;color:#166534}
.ask-num.empty{background:#f4f3ef;color:#aaa}
.ask-input{flex:1;padding:10px 14px;border:1.5px solid #e0dfdb;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;color:#111;background:#fafaf8}
.ask-input:focus{border-color:#7c3aed;background:#fff}
.ask-input.valid{border-color:#16a34a;background:#f0fdf4}
.ask-progress{display:flex;gap:6px;margin-bottom:14px}
.ask-dot{width:8px;height:8px;border-radius:50%;background:#e5e7eb;transition:background .2s}
.ask-dot.on{background:#7c3aed}
.ask-btn{width:100%;padding:12px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;font-family:inherit}
.ask-btn:hover:not(:disabled){background:#6d28d9}
.ask-btn:disabled{background:#c4b5fd;cursor:not-allowed}



/* ── 질문 카드 영역 ── */
.q-section{animation:fadeIn .3s ease;border-top:1px solid #ebe9e4;padding-top:18px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.q-section-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.q-kw-label{font-size:17px;font-weight:700;color:#111}
.q-kw-label em{font-style:normal}
.copy-all{font-size:13px;padding:6px 14px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#666;cursor:pointer}
.copy-all:hover{background:#f5f0ff;color:#7c3aed;border-color:#7c3aed}
.my-qs{background:#f5f0ff;border-radius:12px;padding:13px 16px;margin-bottom:16px;border:1px solid #ede9fe}
.my-qs-title{font-size:12px;font-weight:600;color:#7c3aed;margin-bottom:7px}
.my-q-item{font-size:13px;color:#4c1d95;padding:3px 0;border-bottom:.5px solid #ede9fe;line-height:1.5}
.my-q-item:last-child{border-bottom:none}

.q-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media(max-width:1000px){.q-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){.q-grid{grid-template-columns:1fr}}
.q-card{background:#fff;border-radius:13px;padding:18px 18px 14px;border:1px solid #eeece8;display:flex;flex-direction:column;gap:0;transition:box-shadow .15s,transform .15s}
.q-card:hover{box-shadow:0 5px 18px rgba(0,0,0,.1);transform:translateY(-2px)}
.q-question{font-size:15px;line-height:1.82;color:#111;word-break:keep-all;flex:1}
.q-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-bottom:11px}
.q-text{font-size:15px;line-height:1.82;color:#111;flex:1;word-break:keep-all}
.q-copy{font-size:11px;padding:4px 11px;border:1px solid #eeecea;border-radius:6px;background:#fafaf8;color:#999;cursor:pointer;align-self:flex-start;margin-top:12px}
.q-copy:hover{background:#f5f0ff;color:#7c3aed}


@media(max-width:700px){.q-grid{grid-template-columns:1fr}}

/* ── 카드: 기존 뱃지 스타일 + 큰 글자 ── */
.q-card{background:#fff;border-radius:14px;padding:18px 18px 14px;border:1px solid #eeecea;display:flex;flex-direction:column;gap:8px}
.q-card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.q-type-badge{font-size:16px;font-weight:700;padding:4px 13px;border-radius:99px;align-self:flex-start}
.q-type-quote{font-size:18px;font-weight:700;line-height:1.4;color:#111;margin-top:2px}
.q-type-when{font-size:12px;color:#aaa;line-height:1.4;margin-bottom:2px}
.q-text{font-size:14px;line-height:1.8;color:#333;flex:1;border-top:.5px solid #f4f3ef;padding-top:10px}
.q-copy{font-size:12px;padding:4px 11px;border:1px solid #eeecea;border-radius:7px;background:#fafaf8;color:#888;cursor:pointer;align-self:flex-start;margin-top:2px}
.q-copy:hover{background:#f5f0ff;color:#7c3aed}
@media(max-width:700px){.layout{flex-direction:column;height:auto}.sidebar{width:100%;max-height:260px;border-right:none;border-bottom:1px solid #e5e5e0}.main{padding:14px}}
</style>
</head>

    k=>[`${k}${jp(k,"gwa")} 관련된 공공기관이나 기업이 공개한 자료를 직접 분석해보면 어떤 숨겨진 맥락을 발견할 수 있을까?`, `${k} 관련 공공 자료 분석을 통한 맥락 발견 탐구`],
    k=>[`${k}에 대해 내가 가졌던 편견이나 잘못된 생각을 점검해보면, 어떤 가정이 가장 먼저 도전을 받을까?`, `${k}에 대한 자기 편견 점검과 비판적 사고 탐구`],
    k=>[`${k}${jp(k,"eul")} 주제로 짧은 글이나 보고서를 작성해 다른 사람을 설득하려면, 어떤 근거와 사례가 가장 효과적일까?`, `${k}에 관한 설득력 있는 근거와 사례 구성 탐구`],
    k=>[`${k}${jp(k,"gwa")} 관련된 사회 문제를 해결하는 프로젝트를 기획한다면, 고등학생으로서 현실적으로 실행 가능한 방법은 무엇일까?`, `고등학생이 실행 가능한 ${k} 개선 프로젝트 탐구`],
  ],

  /* 차원F */
  [
    k=>[`${k} 분야에서 일하는 전문가들은 실제로 하루를 어떻게 보내며, 그 일의 가장 보람 있는 순간과 가장 힘든 순간은 언제일까?`, `${k} 분야 전문가의 실제 직업 세계와 보람·고충 탐구`],
    k=>[`${k}${jp(k,"i")} 우리 사회에서 해결되지 않으면 10년 후 어떤 사회 문제가 심각해질까? 그 연결 고리를 추적해보면 어떨까?`, `${k} 미해결 시 10년 후 사회 문제의 연쇄 탐구`],
    k=>[`${k}에 관심 있는 사람이 갖춰야 할 핵심 역량은 무엇이며, 지금 고등학교 생활에서 그것을 어떻게 키울 수 있을까?`, `${k} 관련 진로를 위한 핵심 역량 개발 방법 탐구`],
    k=>[`${k}${jp(k,"i")} 특정 직업이나 산업의 모습을 어떻게 바꾸고 있으며, 그 변화로 새롭게 생겨나거나 사라지는 역할은 무엇일까?`, `${k}${jp(k,"i")} 바꾸는 직업·산업 생태계와 새로운 역할 탐구`],
    k=>[`${k}${jp(k,"eul")} 활용해 소외된 사람이나 취약한 지역사회를 실질적으로 도울 수 있는 방법이 있을까?`, `${k}${jp(k,"eul")} 활용한 사회적 약자 지원 방법 탐구`],
    k=>[`${k}에 관한 정책이나 제도를 설계하는 사람이라면, 어떤 집단의 목소리를 가장 먼저 들어야 하고 왜 그럴까?`, `${k} 관련 정책 설계 시 우선 청취 대상과 이유 탐구`],
    k=>[`${k}에 관심이 생긴 계기를 돌아보고, 그 관심이 구체적인 진로나 행동으로 이어지려면 어떤 첫 걸음이 필요할까?`, `${k}에 대한 관심을 진로와 행동으로 연결하는 탐구`],
    k=>[`${k}${jp(k,"i")} 미래에 더 중요해진다면, 지금부터 어떤 지식과 경험을 쌓아두어야 나중에 강점이 될 수 있을까?`, `${k} 분야에서 미래 강점을 만드는 준비 방법 탐구`],
    k=>[`${k}${jp(k,"eul")} 둘러싼 사회 문제를 바라보면서 내가 느끼는 감정(분노, 안타까움, 희망 등)은 무엇이며, 그 감정이 탐구의 출발점이 될 수 있을까?`, `${k}에 대한 감정적 반응을 탐구 동기로 전환하는 방법`],
    k=>[`${k}${jp(k,"gwa")} 내가 평소에 관심 갖는 전혀 다른 주제를 연결해보면, 어떤 새롭고 독창적인 탐구 주제가 떠오를까?`, `${k}${jp(k,"gwa")} 이질적 관심사의 창의적 연결을 통한 융합 탐구`],
  ]
];

const PRIME_OFFSETS = [0, 13, 29, 43, 61, 79];


/* 한국어 조사 자동 선택 (받침 유무 판별) */
function hasJong(kw) {
  const code = kw.charCodeAt(kw.length - 1);
  if (code < 0xAC00 || code > 0xD7A3) return false;
  return (code - 0xAC00) % 28 !== 0;
}
function isRieul(kw) {
  const code = kw.charCodeAt(kw.length - 1);
  if (code < 0xAC00 || code > 0xD7A3) return false;
  return (code - 0xAC00) % 28 === 8;
}
function jp(kw, type) {
  const jong = hasJong(kw);
  const rieul = isRieul(kw);
  switch(type) {
    case 'i':    return jong ? '이' : '가';
    case 'eul':  return jong ? '을' : '를';
    case 'eun':  return jong ? '은' : '는';
    case 'euro': return (jong && !rieul) ? '으로' : '로';
    case 'gwa':  return jong ? '과' : '와';
    default: return '';
  }
}

function kwHash(kw, mod) {
  let h = 2166136261;
  for (let i = 0; i < kw.length; i++) { h = Math.imul(h ^ kw.charCodeAt(i), 16777619); }
  return Math.abs(h) % mod;
}

function genQ(kw, dept, 계열) {
  // 6개 질문 유형(차원)에 1개씩 고정 배치하던 방식을 없애고,
  // 전체 질문 풀을 하나로 합쳐 키워드마다 서로 다른 조합·순서로 6개를 자유롭게 선택한다.
  const flat = [];
  QPOOL.forEach(g => g.forEach(fn => flat.push(fn)));
  const total = flat.length;
  const spacing = 7 + kwHash(kw, 5);      // 키워드마다 7~11의 다른 간격
  const picks = [];
  const used = new Set();
  let idx = kwHash(kw, total), step = 0;
  while (picks.length < 6 && used.size < total) {
    idx = (idx + spacing + step) % total;
    if (!used.has(idx)) { used.add(idx); picks.push(flat[idx]); }
    step++;
  }
  return picks.map(fn => { const pair = fn(kw, dept); return { question: pair[0], topic: pair[1] }; });
}

function cp1(i) {
  var q = curQ[i];
  if (!q) return;
  navigator.clipboard.writeText('질문: '+q.question+'\n탐구 주제: '+q.topic).catch(function(){});
}
function cpAll() {
  if (!curQ.length) return;
  var txt = '[학과: '+cur.dept+' / 키워드: '+curKw+']\n\n' +
    curQ.map(function(q,i){ return (i+1)+'. 질문: '+q.question+'\n   탐구 주제: '+q.topic; }).join('\n\n');
  navigator.clipboard.writeText(txt).catch(function(){});
}

let cur={dept:null,계열:null},curKw=null,curQ=[],openSec={};

function isValidQ(v){return v.trim().length>=8&&v.includes('?');}

function renderNav(){
  const q=document.getElementById('search').value.trim();
  let h='';
  for(const[계열,depts]of Object.entries(DATA)){
    const c=COLORS[계열];
    const keys=Object.keys(depts).filter(d=>!q||d.includes(q));
    if(!keys.length)continue;
    const open=q?true:openSec[계열]===true;
    h+=`<div>
<button class="계열-btn" style="background:${c.h};color:${c.bf}" onclick="tog('${계열}')">
  <span>${계열}계열<small style="font-weight:400;opacity:.6;margin-left:5px">${keys.length}</small></span>

</button>

</div></div>`;
  }
  document.getElementById('nav').innerHTML=h;
}

function tog(k){openSec[k]=openSec[k]===true?false:true;renderNav();}

function sel(dept,계열){
  cur={dept,계열};curKw=null;curQ=[];renderNav();

</div>
<div class="kw-label">핵심 키워드 — 클릭하면 먼저 나만의 질문을 3개 써본 뒤 탐구 카드가 나타납니다</div>
<div class="kw-wrap" id="kw">
${kws.map(kw=>`<button class="kw-chip" style="border-color:${c.a}33"

function pick(kw){
  curKw=kw;curQ=[];

  document.querySelectorAll('.kw-chip').forEach(el=>{
    el.dataset.s=el.textContent===kw?'1':'';

    else{el.classList.remove('sel');el.style.background='';el.style.color='';el.style.borderColor=c.a+'33';}
  });

  document.getElementById('qp').innerHTML=`
<div class="ask-panel">

  <div class="ask-types-guide">
    <div style="font-size:11px;font-weight:600;color:#888;margin-bottom:8px">📋 이런 방식으로 질문할 수 있어요</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 12px">
      <div><span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;background:#dbeafe;color:#1e40af;margin-right:5px">① 검증형</span><span style="font-size:12px;color:#555">정말 그럴까? 진짜 그럴까?</span></div>
      <div><span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;background:#dcfce7;color:#166534;margin-right:5px">② 원인형</span><span style="font-size:12px;color:#555">어떻게 그럴까? 왜 그럴까?</span></div>
      <div><span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;background:#ffe4cc;color:#9a3412;margin-right:5px">③ 대안형</span><span style="font-size:12px;color:#555">이것과 다른 설명, 이론은 없을까?</span></div>
      <div><span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;background:#fef9c3;color:#854d0e;margin-right:5px">④ 현상형</span><span style="font-size:12px;color:#555">이로 인해 어떤 현상이 나타나고 있을까?</span></div>
      <div><span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;background:#ede9fe;color:#4c1d95;margin-right:5px">⑤ 적용형</span><span style="font-size:12px;color:#555">이 원리는 어디에 적용되고 있을까?</span></div>
      <div><span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;background:#ccfbf1;color:#065f46;margin-right:5px">⑥ 융합형</span><span style="font-size:12px;color:#555">이것을 내 관심 분야에 적용할 수 있을까?</span></div>
    </div>
  </div>
  <div class="ask-progress" id="ap">

  </div>
  <div class="ask-inputs">
    ${[1,2,3].map(n=>`
    <div class="ask-row">
      <div class="ask-num empty" id="an${n}">${n}</div>
      <input class="ask-input" id="ai${n}" placeholder="질문 ${n}을 입력하세요..." oninput="chkQ(${n})" onkeydown="if(event.key==='Enter'&&${n}<3)document.getElementById('ai${n+1}').focus()">
    </div>`).join('')}
  </div>
  <button class="ask-btn" id="ask-btn" onclick="showCards()" disabled>탐구 질문 카드 열기 →</button>

function chkQ(n){
  const v=document.getElementById(`ai${n}`).value;
  const ok=isValidQ(v);
  document.getElementById(`ai${n}`).className='ask-input'+(ok?' valid':'');
  document.getElementById(`an${n}`).className='ask-num '+(ok?'valid':'empty');
  const cnt=[1,2,3].filter(i=>isValidQ(document.getElementById(`ai${i}`).value)).length;
  [0,1,2].forEach(i=>document.getElementById(`d${i}`).className='ask-dot'+(i<cnt?' on':''));
  document.getElementById('ask-btn').disabled=cnt<3;
}
